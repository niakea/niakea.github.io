<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>niakea.la</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

  :root {
    --bg: #09090b;
    --fg: #fafafa;
    --muted: rgba(250,250,250,0.4);
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.15);
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle gradient mesh background */
  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-mesh .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0;
    animation: orbFadeIn 2s ease forwards;
  }

  .bg-mesh .orb:nth-child(1) {
    width: 600px; height: 600px;
    background: var(--accent);
    top: -15%; right: -10%;
    opacity: 0;
    animation-delay: 0.2s;
  }

  .bg-mesh .orb:nth-child(2) {
    width: 500px; height: 500px;
    background: #6366f1;
    bottom: -20%; left: -5%;
    opacity: 0;
    animation-delay: 0.5s;
  }

  .bg-mesh .orb:nth-child(3) {
    width: 300px; height: 300px;
    background: #a78bfa;
    top: 40%; left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation-delay: 0.8s;
  }

  @keyframes orbFadeIn {
    to { opacity: 0.07; }
  }

  /* Fine grain texture */
  .bg-mesh::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 128px;
    opacity: 0.5;
  }

  /* Nav */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--fg);
    opacity: 0.7;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .brand:hover { opacity: 1; }


  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 800px;
    padding: 0 2rem;
  }

  .headline {
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 1.1;
    color: var(--fg);
  }

  .headline .line {
    display: block;
  }

  .headline .static {
    opacity: 0.9;
  }

  /* Typing container */
  .cycle-wrapper {
    display: inline;
    position: relative;
  }

  .cycle-wrapper .typed-text {
    background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cycle-wrapper .cursor {
    display: inline-block;
    width: 3px;
    height: 0.85em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: baseline;
    position: relative;
    top: 0.08em;
    border-radius: 1px;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Subtitle */
  .subtitle {
    margin-top: 1.5rem;
    font-size: clamp(0.95rem, 1.8vw, 1.1rem);
    font-weight: 400;
    color: var(--muted);
    line-height: 1.6;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }


  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Headline entrance */
  .headline {
    opacity: 0;
    animation: fadeUp 0.8s ease 0.15s forwards;
  }

  /* Responsive */
  @media (max-width: 640px) {
    nav { padding: 1rem 1.25rem; }
    .content { padding: 0 1.25rem; }
  }
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<nav>
  <a href="#" class="brand">niakea.la</a>
</nav>

<div class="content">
  <h1 class="headline">
    <span class="line"><span class="static">we build</span></span>
    <span class="line">
      <span class="cycle-wrapper" id="cycle"><span class="typed-text"></span><span class="cursor"></span></span>
    </span>
  </h1>
  <p class="subtitle">We architect clarity where others see complexity.</p>
</div>

<script>
  const words = ['finance', 'decentralization', 'processes', 'governance', 'data', 'stars'];
  const typedEl = document.querySelector('.typed-text');
  let wordIndex = 0;
  let charIndex = 0;
  let isDeleting = false;

  const TYPE_SPEED = 80;
  const DELETE_SPEED = 50;
  const PAUSE_AFTER_TYPE = 1800;
  const PAUSE_AFTER_DELETE = 400;

  function tick() {
    const currentWord = words[wordIndex];

    if (!isDeleting) {
      // Typing
      charIndex++;
      typedEl.textContent = currentWord.slice(0, charIndex);

      if (charIndex === currentWord.length) {
        // Finished typing — pause, then start deleting
        setTimeout(() => { isDeleting = true; tick(); }, PAUSE_AFTER_TYPE);
        return;
      }
      setTimeout(tick, TYPE_SPEED + Math.random() * 40);
    } else {
      // Deleting
      charIndex--;
      typedEl.textContent = currentWord.slice(0, charIndex);

      if (charIndex === 0) {
        // Finished deleting — move to next word
        isDeleting = false;
        wordIndex = (wordIndex + 1) % words.length;
        setTimeout(tick, PAUSE_AFTER_DELETE);
        return;
      }
      setTimeout(tick, DELETE_SPEED);
    }
  }

  // Start
  tick();
</script>

</body>
</html>
